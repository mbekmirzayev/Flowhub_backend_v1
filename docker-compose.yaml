services:
  flowhub_backend_services:
    build: .
    command: uv run gunicorn root.wsgi:application --bind 0.0.0.0:8081
    env_file:
      - env/.env.prod  # Umumiy sozlamalar (DEBUG, SECRET_KEY va h.k.)         # Postgres sozlamalari (POSTGRES_USER, POSTGRES_PASSWORD va h.k.)
    environment:
      - DOCKER_MODE=true
    depends_on:
      - postgres_service
      - redis_service
    ports:
      - "9000:8081"

  postgres_service:
    image: postgres:alpine
    container_name: flowhub_postgres
    env_file:
      - env/.env
    ports:
      - "5432:5432"
    volumes:
      - flowhub_data:/var/lib/postgresql

  redis_service:
    image: redis:alpine
    container_name: flowhub_redis
    ports:
      - "6379:6379"
volumes:
  flowhub_data: